name: CI

# Déclencheur : à chaque push ou PR sur main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lint (sans bloquer sur modules/)
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . \
            --max-line-length=100 \
            --exclude=modules,assets,.venv,__pycache__

      # 5. Smoke-test Streamlit
      - name: Smoke-test Streamlit
        run: |
          nohup streamlit run streamlit_app.py --server.port 8501 &
          sleep 10
          curl -f http://localhost:8501/ || (echo "Streamlit failed" && exit 1)

