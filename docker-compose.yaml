################################################################################
#                    TSAR – stack 100 % localhost / sans IA                     #
#  • Compose V2 n’a plus besoin du champ “version:”, on peut l’omettre.        #
################################################################################

services:
# ───────────────────────── TOOLBOX (Kali headless) ────────────────────────────
  toolbox:
    container_name: toolbox
    build:
      context: ./toolbox
      dockerfile: Dockerfile
    image: tsar/toolbox:light
    command: tail -f /dev/null              # conteneur toujours “vivant”
    labels:
      - "traefik.enable=false"              # pas de Traefik dans la stack locale
    networks: [tsar-net]

# ─────────────────────────────── POSTGRES -------------------------------------
  db:
    image: postgres:16
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-tsar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tsarpass}
      POSTGRES_DB:       ${POSTGRES_DB:-tsar}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [tsar-net]

# ─────────────────────────────── REDIS ----------------------------------------
  redis:
    image: redis:7
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    networks: [tsar-net]

# ─────────────────────────────── CELERY WORKER --------------------------------
  worker:
    build:
      context: .
      dockerfile: web/Dockerfile            # même image que Flask
    image: tsar/worker:latest
    env_file: .env
    environment:
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      TOOLBOX_CONTAINER:     toolbox        # facilite docker-py
    depends_on:
      db:       {condition: service_healthy}
      redis:    {condition: service_started}
      toolbox:  {condition: service_started}
    command: >
      celery -A app.tasks:celery worker
             --loglevel=info
             --concurrency=4
    # tourne root → accès au socket Docker ; retirer si vous préférez un user non-root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./web/:/app            # hot-reload
      - ./modules/:/app/modules
    networks: [tsar-net]
    restart: unless-stopped

# ─────────────────────────────── FLASK WEB ------------------------------------
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: tsar/web:latest
    env_file: .env
    environment:
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      TOOLBOX_CONTAINER:     toolbox
    depends_on:
      db:       {condition: service_healthy}
      redis:    {condition: service_started}
      toolbox:  {condition: service_started}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./web/:/app
      - ./modules/:/app/modules
    ports:
      - "5373:5373"            # http://localhost:5373
    networks: [tsar-net]
    restart: unless-stopped

################################################################################
#                               NETWORKS & VOLUMES                              #
################################################################################
networks:
  tsar-net:

volumes:
  db-data:

